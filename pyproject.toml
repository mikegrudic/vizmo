[build-system]
requires = ["setuptools >= 77.0.3"]
build-backend = "setuptools.build_meta"

[project]
name = "vizmo"
version = "0.1"
authors = [
  { name="Mike Grudić", email="mike.grudic@gmail.com" },
]
description = "GIZMO visualization routines"
readme = "README.md"
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
]
dependencies = [
  "meshoid", "sympy", "numpy", "sphinx_rtd_theme", "astropy", "matplotlib", "scipy", "numba","pip-system-certs"
]

license = "MIT"
license-files = ["LICEN[CS]E*"]

[project.urls]
Homepage = "https://github.com/mikegrudic/vizmo"
Issues = "https://github.com/mikegrudic/vizmo/issues"